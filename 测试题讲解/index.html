<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据结构测试题 · 复习导航</title>
<style>
:root {
  --bg: #0f172a;
  --sidebar-bg: #1e293b;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --green: #4ade80;
  --red: #f87171;
  --amber: #fbbf24;
  --border: #334155;
  --hover: #2d3a50;
  --active: #1e3a5f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ====== SIDEBAR ====== */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.sidebar-header {
  padding: 1.2rem 1.2rem 0.8rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-header h1 {
  font-size: 1.15rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.sidebar-header .info {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 2px;
}

.nav-list {
  flex: 1;
  overflow-y: auto;
  padding: 0.6rem 0;
  scroll-behavior: smooth;
}
.nav-list::-webkit-scrollbar { width: 4px; }
.nav-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.nav-group {
  margin-bottom: 4px;
}
.nav-group-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--amber);
  padding: 0.8rem 1.2rem 0.4rem;
  font-weight: 700;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0.55rem 1.2rem;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--muted);
  border-left: 2px solid transparent;
  transition: all 0.15s;
  text-decoration: none;
}
.nav-item:hover {
  background: var(--hover);
  color: var(--text);
}
.nav-item.active {
  background: var(--active);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-item .num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 700;
  background: var(--border);
  color: var(--muted);
  flex-shrink: 0;
}
.nav-item.active .num {
  background: var(--accent);
  color: #0f172a;
}
.nav-item .tag {
  font-size: 0.6rem;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: auto;
  flex-shrink: 0;
}
.nav-item .tag.choice { background: #1e3a5f; color: var(--accent); }
.nav-item .tag.fill { background: #2a1a3a; color: #c084fc; }
.nav-item .tag.short { background: #1a2a1a; color: var(--green); }
.nav-item .tag.code { background: #3a1a1a; color: var(--red); }

/* search */
.search-box {
  padding: 0 1.2rem 0.8rem;
  flex-shrink: 0;
}
.search-box input {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.8rem;
  outline: none;
}
.search-box input:focus {
  border-color: var(--accent);
}
.search-box input::placeholder { color: #475569; }

/* ====== MAIN VIEW ====== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  padding: 0.7rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  background: var(--sidebar-bg);
}
.topbar .current-title {
  font-weight: 600;
  font-size: 0.95rem;
}
.topbar .current-subtitle {
  font-size: 0.75rem;
  color: var(--muted);
}
.topbar .nav-arrows {
  margin-left: auto;
  display: flex;
  gap: 6px;
}
.topbar .nav-arrows button {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.15s;
}
.topbar .nav-arrows button:hover {
  background: var(--hover);
  border-color: var(--accent);
}

.iframe-container {
  flex: 1;
  background: #fff; /* html pages have their own bg */
  overflow: hidden;
}
.iframe-container iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ====== MOBILE RESPONSIVE ====== */
@media (max-width: 700px) {
  .sidebar { width: 60px; min-width: 60px; }
  .sidebar-header h1 { font-size: 0.7rem; }
  .sidebar-header .info { display: none; }
  .nav-item .tag, .nav-item span:not(.num) { display: none; }
  .nav-item { justify-content: center; padding: 0.7rem; }
  .nav-group-title { display: none; }
  .search-box { display: none; }
  .topbar { padding: 0.5rem 0.8rem; }
  .topbar .current-title { font-size: 0.8rem; }
  .topbar .current-subtitle { display: none; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>📚 数据结构测试题</h1>
    <div class="info">28 道题 · 含详细解析 · 2026春</div>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 搜索题目..." oninput="filterNav()">
  </div>
  <nav class="nav-list" id="navList">
    <!-- generated by JS -->
  </nav>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="current-title" id="currentTitle">选择题第1题</div>
      <div class="current-subtitle" id="currentSubtitle">ADT 定义</div>
    </div>
    <div class="nav-arrows">
      <button onclick="prevQuestion()" title="上一题">◀ 上一题</button>
      <button onclick="nextQuestion()" title="下一题">下一题 ▶</button>
    </div>
  </div>
  <div class="iframe-container">
    <iframe id="viewer" src="" title="题目内容"></iframe>
  </div>
</main>

<script>
const questions = [
  // 选择题
  { id: '01', file: '01_选择题_ADT定义.html', title: '选择题第1题', sub: 'ADT 定义', group: '选择题', tag: 'choice' },
  { id: '02', file: '02_选择题_线性表插入位置.html', title: '选择题第2题', sub: '线性表插入位置', group: '选择题', tag: 'choice' },
  { id: '03', file: '03_选择题_循环链表判空.html', title: '选择题第3题', sub: '循环链表判空', group: '选择题', tag: 'choice' },
  { id: '04', file: '04_选择题_出栈序列计数.html', title: '选择题第4题', sub: '出栈序列计数', group: '选择题', tag: 'choice' },
  { id: '05', file: '05_选择题_循环队列判空.html', title: '选择题第5题', sub: '循环队列判空', group: '选择题', tag: 'choice' },
  { id: '06', file: '06_选择题_三角矩阵存储.html', title: '选择题第6题', sub: '三角矩阵压缩存储', group: '选择题', tag: 'choice' },
  { id: '07', file: '07_选择题_广义表HeadTail.html', title: '选择题第7题', sub: '广义表 Head/Tail', group: '选择题', tag: 'choice' },
  { id: '08', file: '08_选择题_快排一趟结果.html', title: '选择题第8题', sub: '快排一趟结果判定', group: '选择题', tag: 'choice' },
  { id: '09', file: '09_选择题_邻接矩阵特点.html', title: '选择题第9题', sub: '邻接矩阵特点', group: '选择题', tag: 'choice' },
  { id: '10', file: '10_选择题_排序对比.html', title: '选择题第10题', sub: '排序算法对比', group: '选择题', tag: 'choice' },
  // 填空题
  { id: '11', file: '11_填空题_时间复杂度O1.html', title: '填空题第1题', sub: '时间复杂度 O(1)', group: '填空题', tag: 'fill' },
  { id: '12', file: '12_填空题_后缀表达式求值.html', title: '填空题第2题', sub: '后缀表达式求值', group: '填空题', tag: 'fill' },
  { id: '13', file: '13_填空题_KMP算法next数组.html', title: '填空题第3题', sub: 'KMP next 数组', group: '填空题', tag: 'fill' },
  { id: '14', file: '14_填空题_哈夫曼树叶结点.html', title: '填空题第4题', sub: '哈夫曼树叶结点数', group: '填空题', tag: 'fill' },
  { id: '15', file: '15_填空题_森林树的个数.html', title: '填空题第5题', sub: '森林中树的个数', group: '填空题', tag: 'fill' },
  { id: '16', file: '16_填空题_Dijkstra算法.html', title: '填空题第6题', sub: 'Dijkstra 算法', group: '填空题', tag: 'fill' },
  { id: '17', file: '17_填空题_BST插入序列.html', title: '填空题第7题', sub: 'BST 插入序列种数', group: '填空题', tag: 'fill' },
  { id: '18', file: '18_填空题_冒泡排序时间复杂度.html', title: '填空题第8题', sub: '冒泡排序时间复杂度', group: '填空题', tag: 'fill' },
  // 简答题
  { id: '19', file: '19_简答题_二叉树遍历与双亲表示.html', title: '简答题第1题', sub: '二叉树遍历与双亲表示法', group: '简答题', tag: 'short' },
  { id: '20', file: '20_简答题_AVL树插入.html', title: '简答题第2题', sub: 'AVL 树插入旋转', group: '简答题', tag: 'short' },
  { id: '21', file: '21_简答题_顺序与折半查找ASL.html', title: '简答题第3题', sub: '顺序查找与折半查找 ASL', group: '简答题', tag: 'short' },
  { id: '22', file: '22_简答题_哈希表线性探测.html', title: '简答题第4题', sub: '哈希表线性探测', group: '简答题', tag: 'short' },
  { id: '23', file: '23_简答题_AOE图关键路径.html', title: '简答题第5题', sub: 'AOE 关键路径', group: '简答题', tag: 'short' },
  { id: '24', file: '24_简答题_Prim最小生成树.html', title: '简答题第6题', sub: 'Prim 最小生成树', group: '简答题', tag: 'short' },
  { id: '25', file: '25_简答题_堆排序过程.html', title: '简答题第7题', sub: '堆排序过程', group: '简答题', tag: 'short' },
  { id: '26', file: '26_简答题_插入排序过程.html', title: '简答题第8题', sub: '插入排序过程', group: '简答题', tag: 'short' },
  // 编程题
  { id: '27', file: '27_编程题_叶结点链表化.html', title: '编程题第1题', sub: '叶结点链表化', group: '编程题', tag: 'code' },
  { id: '28', file: '28_编程题_链表按序插入.html', title: '编程题第2题', sub: '链表按序插入', group: '编程题', tag: 'code' },
];

const tagLabels = { choice: '选', fill: '填', short: '简', code: '码' };
let currentIndex = 0;

// Build nav
const navList = document.getElementById('navList');
let lastGroup = '';
questions.forEach((q, i) => {
  if (q.group !== lastGroup) {
    const title = document.createElement('div');
    title.className = 'nav-group-title';
    title.textContent = q.group;
    navList.appendChild(title);
    lastGroup = q.group;
  }
  const item = document.createElement('div');
  item.className = 'nav-item';
  item.id = 'nav-' + q.id;
  item.innerHTML = `<span class="num">${q.id}</span><span>${q.sub}</span><span class="tag ${q.tag}">${tagLabels[q.tag]}</span>`;
  item.onclick = () => loadQuestion(i);
  navList.appendChild(item);
});

function loadQuestion(index) {
  currentIndex = index;
  const q = questions[index];

  // Update iframe
  document.getElementById('viewer').src = q.file;

  // Update topbar
  document.getElementById('currentTitle').textContent = q.title;
  document.getElementById('currentSubtitle').textContent = q.sub;

  // Update nav active
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItem = document.getElementById('nav-' + q.id);
  if (navItem) {
    navItem.classList.add('active');
    navItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Save to localStorage
  localStorage.setItem('ds_test_current', index);
}

function nextQuestion() {
  if (currentIndex < questions.length - 1) loadQuestion(currentIndex + 1);
}
function prevQuestion() {
  if (currentIndex > 0) loadQuestion(currentIndex - 1);
}

function filterNav() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = text.includes(query) ? 'flex' : 'none';
  });
  document.querySelectorAll('.nav-group-title').forEach(title => {
    const group = title.textContent;
    const hasVisible = [...document.querySelectorAll('.nav-item')].some(
      el => el.style.display !== 'none' && questions.find(q => q.group === group && 'nav-' + q.id === el.id)
    );
    title.style.display = hasVisible ? 'block' : 'none';
  });
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextQuestion(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevQuestion(); }
});

// Load saved state or default to first
const saved = localStorage.getItem('ds_test_current');
if (saved !== null && saved < questions.length) {
  loadQuestion(parseInt(saved));
} else {
  loadQuestion(0);
}
</script>

</body>
</html>
