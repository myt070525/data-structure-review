<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据结构测验2026春 · 复习导航</title>
<style>
:root {
  --bg: #0f172a; --sidebar-bg: #1e293b; --text: #e2e8f0; --muted: #94a3b8;
  --accent: #f97316; --accent2: #fb923c; --green: #4ade80; --red: #f87171;
  --amber: #fbbf24; --border: #334155; --hover: #2d3a50; --active: #2a1a0a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; overflow:hidden; }
.sidebar { width:280px; min-width:280px; background:var(--sidebar-bg); border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.sidebar-header { padding:1.2rem 1.2rem 0.8rem; border-bottom:1px solid var(--border); flex-shrink:0; }
.sidebar-header h1 { font-size:1.15rem; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sidebar-header .info { font-size:0.75rem; color:var(--muted); margin-top:2px; }
.nav-list { flex:1; overflow-y:auto; padding:0.6rem 0; scroll-behavior:smooth; }
.nav-list::-webkit-scrollbar { width:4px; }
.nav-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.nav-group { margin-bottom:4px; }
.nav-group-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; color:var(--amber); padding:0.8rem 1.2rem 0.4rem; font-weight:700; }
.nav-item { display:flex; align-items:center; gap:10px; padding:0.55rem 1.2rem; cursor:pointer; font-size:0.85rem; color:var(--muted); border-left:2px solid transparent; transition:all 0.15s; text-decoration:none; }
.nav-item:hover { background:var(--hover); color:var(--text); }
.nav-item.active { background:var(--active); color:var(--accent); border-left-color:var(--accent); font-weight:600; }
.nav-item .num { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:6px; font-size:0.7rem; font-weight:700; background:var(--border); color:var(--muted); flex-shrink:0; }
.nav-item.active .num { background:var(--accent); color:#0f172a; }
.nav-item .tag { font-size:0.6rem; padding:1px 6px; border-radius:4px; margin-left:auto; flex-shrink:0; }
.nav-item .tag.choice { background:#3a1a0a; color:var(--accent); }
.nav-item .tag.fill { background:#2a1a3a; color:#c084fc; }
.nav-item .tag.short { background:#1a2a1a; color:var(--green); }
.nav-item .tag.code { background:#3a1a1a; color:var(--red); }
.search-box { padding:0 1.2rem 0.8rem; flex-shrink:0; }
.search-box input { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:0.8rem; outline:none; }
.search-box input:focus { border-color:var(--accent); }
.search-box input::placeholder { color:#475569; }
.main { flex:1; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.topbar { padding:0.7rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-shrink:0; background:var(--sidebar-bg); }
.topbar .current-title { font-weight:600; font-size:0.95rem; }
.topbar .current-subtitle { font-size:0.75rem; color:var(--muted); }
.topbar .nav-arrows { margin-left:auto; display:flex; gap:6px; }
.topbar .nav-arrows button { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:0.85rem; transition:all 0.15s; }
.topbar .nav-arrows button:hover { background:var(--hover); border-color:var(--accent); }
.iframe-container { flex:1; background:#fff; overflow:hidden; }
.iframe-container iframe { width:100%; height:100%; border:none; display:block; }
@media (max-width:700px) {
  .sidebar { width:60px; min-width:60px; }
  .sidebar-header h1 { font-size:0.7rem; }
  .sidebar-header .info { display:none; }
  .nav-item .tag, .nav-item span:not(.num) { display:none; }
  .nav-item { justify-content:center; padding:0.7rem; }
  .nav-group-title { display:none; }
  .search-box { display:none; }
  .topbar { padding:0.5rem 0.8rem; }
  .topbar .current-title { font-size:0.8rem; }
  .topbar .current-subtitle { display:none; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>📝 数据结构测验</h1>
    <div class="info">2025-2026第二学期 · 15 道题 · 含详细解析</div>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 搜索题目..." oninput="filterNav()">
  </div>
  <nav class="nav-list" id="navList"></nav>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <div class="current-title" id="currentTitle">选择填空第1题</div>
      <div class="current-subtitle" id="currentSubtitle">时间复杂度 O(mn)</div>
    </div>
    <div class="nav-arrows">
      <button onclick="prevQuestion()">◀ 上一题</button>
      <button onclick="nextQuestion()">下一题 ▶</button>
    </div>
  </div>
  <div class="iframe-container">
    <iframe id="viewer" src="" title="题目内容"></iframe>
  </div>
</main>

<script>
const questions = [
  { id:'01',file:'01_选择填空_时间复杂度.html',title:'选择填空第1题',sub:'时间复杂度 O(mn)',group:'一、选择填空题',tag:'choice' },
  { id:'02',file:'02_选择填空_ADT三要素.html',title:'选择填空第2题',sub:'ADT三要素',group:'一、选择填空题',tag:'choice' },
  { id:'03',file:'03_选择填空_出栈序列.html',title:'选择填空第3题',sub:'出栈序列计数',group:'一、选择填空题',tag:'choice' },
  { id:'04',file:'04_选择填空_循环队列.html',title:'选择填空第4题',sub:'循环队列元素个数',group:'一、选择填空题',tag:'choice' },
  { id:'05',file:'05_选择填空_广义表表尾.html',title:'选择填空第5题',sub:'广义表表尾',group:'一、选择填空题',tag:'choice' },
  { id:'06',file:'06_选择填空_后缀表达式.html',title:'选择填空第6题',sub:'后缀表达式求值',group:'一、选择填空题',tag:'choice' },
  { id:'07',file:'07_选择填空_KMP算法.html',title:'选择填空第7题',sub:'KMP next数组',group:'一、选择填空题',tag:'choice' },
  { id:'08',file:'08_选择填空_二叉树左子树.html',title:'选择填空第8题',sub:'二叉树左子树结点',group:'一、选择填空题',tag:'choice' },
  { id:'09',file:'09_选择填空_完全二叉树叶子.html',title:'选择填空第9题',sub:'完全二叉树叶子数',group:'一、选择填空题',tag:'choice' },
  { id:'10',file:'10_简答题_二叉树遍历.html',title:'简答题第1题',sub:'二叉树三种遍历',group:'二、简答题',tag:'short' },
  { id:'11',file:'11_简答题_哈夫曼树.html',title:'简答题第2题',sub:'哈夫曼树 & WPL',group:'二、简答题',tag:'short' },
  { id:'12',file:'12_简答题_双亲表示法.html',title:'简答题第3题',sub:'双亲表示法 → 树 → 孩子兄弟',group:'二、简答题',tag:'short' },
  { id:'13',file:'13_编程题_双向链表删除.html',title:'编程题第1题',sub:'双向链表删除头结点',group:'三、编程题',tag:'code' },
  { id:'14',file:'14_编程题_有序顺序表合并.html',title:'编程题第2题',sub:'有序顺序表合并',group:'三、编程题',tag:'code' },
  { id:'15',file:'15_编程题_销毁二叉树.html',title:'编程题第3题',sub:'后序销毁二叉树',group:'三、编程题',tag:'code' },
];
const tagLabels = { choice:'选', fill:'填', short:'简', code:'码' };
let currentIndex = 0;
const navList = document.getElementById('navList');
let lastGroup = '';
questions.forEach((q,i) => {
  if(q.group!==lastGroup){ const t=document.createElement('div'); t.className='nav-group-title'; t.textContent=q.group; navList.appendChild(t); lastGroup=q.group; }
  const item=document.createElement('div'); item.className='nav-item'; item.id='nav-'+q.id;
  item.innerHTML=`<span class="num">${q.id}</span><span>${q.sub}</span><span class="tag ${q.tag}">${tagLabels[q.tag]}</span>`;
  item.onclick=()=>loadQuestion(i); navList.appendChild(item);
});
function loadQuestion(index){
  currentIndex=index; const q=questions[index];
  document.getElementById('viewer').src=q.file;
  document.getElementById('currentTitle').textContent=q.title;
  document.getElementById('currentSubtitle').textContent=q.sub;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navItem=document.getElementById('nav-'+q.id);
  if(navItem){ navItem.classList.add('active'); navItem.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  localStorage.setItem('ds_quiz_current',index);
}
function nextQuestion(){ if(currentIndex<questions.length-1) loadQuestion(currentIndex+1); }
function prevQuestion(){ if(currentIndex>0) loadQuestion(currentIndex-1); }
function filterNav(){
  const query=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(item=>{ item.style.display=item.textContent.toLowerCase().includes(query)?'flex':'none'; });
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){ e.preventDefault(); nextQuestion(); }
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){ e.preventDefault(); prevQuestion(); }
});
const saved=localStorage.getItem('ds_quiz_current');
if(saved!==null&&saved<questions.length){ loadQuestion(parseInt(saved)); } else { loadQuestion(0); }
</script>
</body>
</html>
